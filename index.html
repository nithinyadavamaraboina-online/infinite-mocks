    <title>Infinite Mocks</title>
    <script>
      // Initialize theme immediately to prevent FOUC (Flash of Unstyled Content) or White Flash
      try {
        const saved = localStorage.getItem('infinite_mocks_theme');
        const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && sysDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    </script>
    <script>
      // Lite Mode Detection (Client-Side Fallback)
      (function() {
        var isLiteRoute = window.location.pathname === '/lite';
        var hasLiteCookie = document.cookie.indexOf('lite_mode=true') !== -1;
        var hasFullCookie = document.cookie.indexOf('lite_mode=false') !== -1;

        // If user explicitly chose full mode, don't redirect
        if (hasFullCookie) return;

        // Detect missing modern features
        var isLegacy = !window.fetch || !window.Promise || !window.URLSearchParams;

        if (isLegacy && !isLiteRoute) {
          window.location.href = '/lite' + window.location.search;
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
